<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opfikon Au, Analysekarte</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: row;
    font-family: sans-serif;
    background: #fff;
    height: 100vh;
    overflow: hidden;
  }

  #main-column {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    background: #fff;
    align-items: center;
  }

  #map-container {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  #map-inner {
    position: relative;
    width: 100%;
    min-width: 50%;
    max-width: 200%;
    transform-origin: center top;
  }

  .layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: auto;
    display: none;
  }

  /* Layer order */
  #Analysekarte-Glatt { z-index: 0; display: block; }
  #Analysekarte-Bauzonen { z-index: 1; }
  #Analysekarte-Strassenlaerm { z-index: 2; }
  #Analysekarte-Eigentuemer { z-index: 3; }
  #Analysekarte-Gebaeudealter { z-index: 4; }
  #Analysekarte-Velowege { z-index: 5; }
  #Analysekarte-Fusswege { z-index: 6; }
  #Analysekarte-Fluglaerm { z-index: 7; }
  #Analysekarte-Basekarte { z-index: 8; display: block; }
  #Analysekarte-Unfaelle { z-index: 9; }
  #Analysekarte-Fussgaengerstreifen { z-index: 10; }
  #Analysekarte-Busstationen { z-index: 11; }

  /* Sidebar */
  #sidebar {
    width: 240px;
    display: flex;
    flex-direction: column;
    background: #fff;
    padding: 4px;
    border-left: 1px solid #ddd;
    position: relative;
  }

  /* Einheitliches Button-Design */
  button {
    display: block;
    width: 100%;
    padding: 2px 4px;
    margin-bottom: 2px;
    border: none;
    border-radius: 4px;
    background-color: #ccc;
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.2s;
  }

  button:hover {
    background-color: #bbb;
  }

  button.active {
    background-color: #4CAF50;
    color: white;
  }

  /* Zoom controls */
  #zoom-controls {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    width: 100%;
  }

  #zoom-controls button {
    font-size: 11px;
  }

  /* Layer buttons */
  #buttons {
    margin-top: 4px;
  }

  /* Legend */
  #legend-container {
    flex: 1;
    overflow-y: auto;
    margin-top: 4px;
  }

  #legend-title {
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 12;
    display: none;
    font-weight: bold;
  }

  #legend-list {
    list-style: none;
  }

  #legend-list li {
    margin: 2px 0;
    display: flex;
    align-items: center;
    font-size: 14px;
  }

  #legend-list li span {
    display: inline-block;
    width: 20px;
    height: 20px;
    margin-right: 5px;
    vertical-align: middle;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  #legend-list li img {
    display: inline-block;
    width: 20px;
    height: 20px;
    object-fit: contain;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* Quellen & Export unten */
  #source-tab {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 240px;
    text-align: center;
    font-size: 11px;
    color: #555;
    padding: 6px;
    background-color: rgba(255,255,255,0.8);
    backdrop-filter: blur(2px);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #source-tab button {
    margin-top: 2px;
  }
</style>
</head>
<body>

<!-- Map -->
<div id="main-column">
  <div id="map-container">
    <div id="map-inner">
      <img src="Analysekarte-Basekarte.png" class="layer" id="Analysekarte-Basekarte">
      <img src="Analysekarte-Bauzonen.png" class="layer" id="Analysekarte-Bauzonen">
      <img src="Analysekarte-Strassenlaerm.png" class="layer" id="Analysekarte-Strassenlaerm">
      <img src="Analysekarte-Glatt.png" class="layer" id="Analysekarte-Glatt">
      <img src="Analysekarte-Gebaeudealter.png" class="layer" id="Analysekarte-Gebaeudealter">
      <img src="Analysekarte-Fusswege.png" class="layer" id="Analysekarte-Fusswege">
      <img src="Analysekarte-Velowege.png" class="layer" id="Analysekarte-Velowege">
      <img src="Analysekarte-Fluglaerm.png" class="layer" id="Analysekarte-Fluglaerm">
      <img src="Analysekarte-Unfaelle.png" class="layer" id="Analysekarte-Unfaelle">
      <img src="Analysekarte-Fussgaengerstreifen.png" class="layer" id="Analysekarte-Fussgaengerstreifen">
      <img src="Analysekarte-Busstationen.png" class="layer" id="Analysekarte-Busstationen">
      <img src="Analysekarte-Eigentuemer.png" class="layer" id="Analysekarte-Eigentuemer">
    </div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">

  <div id="zoom-controls">
    <button onclick="zoomMap(-10)">-10%</button>
    <button onclick="zoomMap(-5)">-5%</button>
    <button id="zoom-default" onclick="zoomDefault()">100%</button>
    <button onclick="zoomMap(5)">+5%</button>
    <button onclick="zoomMap(10)">+10%</button>
  </div>

  <div id="buttons">
    <button onclick="toggleLayer('Analysekarte-Bauzonen', this)">Bauzonen</button>
    <button onclick="toggleLayer('Analysekarte-Gebaeudealter', this)">Gebäudealter</button>
    <button onclick="toggleLayer('Analysekarte-Eigentuemer', this)">Grundeigentümer</button>
    <button onclick="toggleLayer('Analysekarte-Fusswege', this)">Fusswege</button>
    <button onclick="toggleLayer('Analysekarte-Fussgaengerstreifen', this)">Fussgängerstreifen</button>
    <button onclick="toggleLayer('Analysekarte-Velowege', this)">Velowege</button>
    <button onclick="toggleLayer('Analysekarte-Busstationen', this)">Busstationen</button>
    <button onclick="toggleLayer('Analysekarte-Unfaelle', this)">Unfälle</button>
    <button onclick="toggleLayer('Analysekarte-Strassenlaerm', this)">Strassenlärm</button>
    <button onclick="toggleLayer('Analysekarte-Fluglaerm', this)">Fluglärm</button>
  </div>

  <div id="legend-container">
    <div id="legend-title">Legende</div>
    <ul id="legend-list"></ul>
  </div>
</div>

<!-- Quellen & Export -->
<div id="source-tab">
  <div>Quellen: GIS-ZH, Swisstopo & Google Maps</div>
  <button onclick="exportVisibleLayers()">Exportieren</button>
</div>

<script>
let zoom = 100;

function updateZoomDisplay() {
  document.getElementById('zoom-default').textContent = zoom + '%';
}

function zoomMap(change) {
  zoom += change;
  if (zoom < 50) zoom = 50;
  if (zoom > 200) zoom = 200;
  document.getElementById('map-inner').style.transform = `scale(${zoom/100})`;
  updateZoomDisplay();
}

function zoomDefault() {
  zoom = 100;
  document.getElementById('map-inner').style.transform = `scale(1)`;
  updateZoomDisplay();
}

function toggleLayer(id, button) {
  const el = document.getElementById(id);
  if (el.style.display === 'block') {
    el.style.display = 'none';
    button.classList.remove('active');
  } else {
    el.style.display = 'block';
    button.classList.add('active');
  }
  updateLegend();
}

// Initialisierung
document.getElementById('Analysekarte-Basekarte').style.display='block';
document.getElementById('Analysekarte-Glatt').style.display='block';
updateZoomDisplay();

async function exportVisibleLayers() {
  const mapInner = document.getElementById('map-inner');
  const allLayers = Array.from(mapInner.querySelectorAll('.layer'));
  const visibleLayers = allLayers.filter(l => l.style.display === 'block');

  if (visibleLayers.length === 0) {
    alert('Keine sichtbaren Layer zum Exportieren.');
    return;
  }

  // Sortiere nach tatsächlichem z-index (von unten nach oben)
  visibleLayers.sort((a, b) => {
    const za = parseInt(getComputedStyle(a).zIndex) || 0;
    const zb = parseInt(getComputedStyle(b).zIndex) || 0;
    return za - zb;
  });

  const ref = visibleLayers[0];
  const width = ref.naturalWidth;
  const height = ref.naturalHeight;

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, width, height);

  for (const layer of visibleLayers) {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { ctx.drawImage(img, 0, 0, width, height); resolve(); };
      img.onerror = reject;
      img.src = layer.src;
    });
  }

  const link = document.createElement('a');
  link.download = 'Analysekarte_Export.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
